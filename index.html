<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formals Housing Signup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f2;color:#1a1a1a;min-height:100vh;padding-bottom:40px}
.header{background:#fff;border-bottom:1px solid rgba(0,0,0,0.09);padding:14px 18px;position:sticky;top:0;z-index:10}
.header h1{font-size:17px;font-weight:600}
.header p{font-size:13px;color:#666;margin-top:2px}
.tabs{display:flex;background:#fff;border-bottom:1px solid rgba(0,0,0,0.09)}
.tab{flex:1;padding:12px 0;border:none;background:none;font-family:inherit;font-size:13px;font-weight:500;color:#888;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.content{padding:14px 14px 0;max-width:500px;margin:0 auto}
.card{background:#fff;border:1px solid rgba(0,0,0,0.09);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.lbl{display:block;font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px}
.lbl:first-child{margin-top:0}
input[type=text],select{width:100%;padding:11px 13px;border:1px solid rgba(0,0,0,0.18);border-radius:9px;font-family:inherit;font-size:15px;background:#fff;color:#1a1a1a;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:#555;box-shadow:0 0 0 3px rgba(0,0,0,0.06)}
.house-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hbtn{padding:11px 12px;border:1px solid rgba(0,0,0,0.15);border-radius:10px;background:#fff;cursor:pointer;text-align:left;font-family:inherit;transition:all .12s}
.hbtn:hover:not(:disabled){border-color:#888}
.hbtn.sel{border:2px solid #1a1a1a;background:#f5f5f5}
.hbtn:disabled{opacity:.38;cursor:not-allowed}
.hbtn .hn{font-size:14px;font-weight:600;display:block}
.hbtn .hc{font-size:12px;margin-top:2px;display:block}
.ok{color:#1a7a52}.low{color:#8a5e00}.full{color:#a32020}
.bar-wrap{height:5px;background:#eee;border-radius:3px;margin-top:6px;overflow:hidden}
.bar{height:100%;border-radius:3px;transition:width .4s}
.b-ok{background:#1a7a52}.b-low{background:#e8a000}.b-full{background:#c0392b}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;transition:opacity .1s,transform .1s}
.btn:active{transform:scale(.98);opacity:.85}
.btn-dark{background:#1a1a1a;color:#fff}
.btn-green{background:#1a7a52;color:#fff}
.btn-out{background:transparent;color:#1a1a1a;border:1px solid rgba(0,0,0,0.18)}
.btn-red{background:#fff0f0;color:#a32020;border:1px solid rgba(163,32,32,.2)}
.ban{border-radius:10px;padding:11px 14px;font-size:14px;font-weight:500;margin-bottom:12px}
.ban-amber{background:#fff8e6;color:#7a5000;border:1px solid rgba(138,94,0,.2)}
.ban-green{background:#e8f7f1;color:#1a7a52;border:1px solid rgba(26,122,82,.2)}
.msg{padding:10px 13px;border-radius:9px;font-size:14px;margin-top:10px}
.err{background:#fff0f0;color:#a32020;border:1px solid rgba(163,32,32,.2)}
.suc{background:#e8f7f1;color:#1a7a52;border:1px solid rgba(26,122,82,.2)}
.pc-item{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:9px;border:1px solid rgba(0,0,0,.09);margin-bottom:5px;font-size:14px;background:#fff}
.pc-active{background:#fff8e6!important;border-color:rgba(138,94,0,.25)!important;font-weight:600;color:#7a5000}
.pc-done{background:#f5f5f2!important;color:#999}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px}
.d-a{background:#e8a000}.d-d{background:#1a7a52}.d-w{background:#ccc}
.sig-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid rgba(0,0,0,.07)}
.del-btn{background:none;border:none;cursor:pointer;color:#bbb;font-size:20px;padding:0 6px;line-height:1}
.del-btn:hover{color:#a32020}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;margin:14px 0 8px}
.chk-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.chk-row input{width:17px;height:17px;accent-color:#1a1a1a;cursor:pointer;flex-shrink:0}
.chk-row label{font-size:14px;cursor:pointer}
.sync{font-size:11px;color:#aaa;text-align:right;margin-top:6px}
hr{border:none;border-top:1px solid rgba(0,0,0,.09);margin:14px 0}
.loading{text-align:center;padding:60px 20px;font-size:14px;color:#888}
.pc-tag{font-size:11px;color:#999;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{display:inline-block;background:#f0f0ee;border-radius:20px;padding:2px 10px;font-size:12px;color:#888;margin-left:8px}
.voided{opacity:.5;text-decoration:line-through}
</style>
</head>
<body>

<div id="main-app" style="display:none">
  <div class="header">
    <h1>Formals Housing Signup</h1>
    <p id="hdr-sub"></p>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-status" onclick="go('status',this)">Status</button>
    <button class="tab" id="tab-signup" onclick="go('signup',this)">Sign Up</button>
    <button class="tab" id="tab-admin" onclick="goAdmin(this)">Admin</button>
  </div>
  <div class="content" id="page"></div>
</div>

<div id="loading" class="loading">Connecting...</div>

<script>
// ── CONFIG ──
var DB = 'https://formals-signups-default-rtdb.firebaseio.com';
var PIN = '6767';
var HOUSES = ['House A','House B','House C','House D','House E'];
var ALL_PCS = ['Fall 2022','Spring 2023','Fall 2023','Spring 2024','Fall 2024','Spring 2025','Fall 2025'];
var CAPS = {A:22,B:22,C:22,D:22,E:22}; // admin can edit these in setup

// ── STATE ──
var ST = {cfg:null, sigs:{}};
var CT = 'status';
var AU = false;
var AS = false;
var SS = {pc:'',house:'',name:'',dn:''};
var SP = ALL_PCS.map(function(n){return {name:n,on:true};});

// ── FIREBASE REST ──
function fg(p){return fetch(DB+'/'+p+'.json').then(function(r){return r.json();});}
function fs(p,v){return fetch(DB+'/'+p+'.json',{method:'PUT',body:JSON.stringify(v)});}
function fp(p,v){return fetch(DB+'/'+p+'.json',{method:'POST',body:JSON.stringify(v)}).then(function(r){return r.json();});}
function fd(p){return fetch(DB+'/'+p+'.json',{method:'DELETE'});}
function fh(p,v){return fetch(DB+'/'+p+'.json',{method:'PATCH',body:JSON.stringify(v)});}

// ── BOOT ──
window.onload = function(){
  poll().then(function(){
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    setInterval(poll, 4000);
  });
};

function poll(){
  return Promise.all([fg('formals/cfg'), fg('formals/sigs')]).then(function(r){
    ST.cfg = r[0];
    ST.sigs = r[1] || {};
    if (!(CT==='admin' && AS)) render();
  }).catch(function(){});
}

// ── HELPERS ──
function sa(){
  return Object.entries(ST.sigs).map(function(e){return Object.assign({id:e[0]},e[1]);}).sort(function(a,b){return a.ts-b.ts;});
}
function hu(name){
  return sa().filter(function(s){return s.house===name && !s.voided;}).reduce(function(a,s){return a+s.count;},0);
}
function tp(){return sa().filter(function(s){return !s.voided;}).reduce(function(a,s){return a+s.count;},0);}
function pct(u,c){return Math.min(100,Math.round(u/c*100));}
function pg(){return document.getElementById('page');}
function alreadySigned(name){
  return sa().some(function(s){return s.name.toLowerCase()===name.toLowerCase() && !s.voided;});
}

// ── ROUTING ──
function go(t, b){
  CT = t;
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  b.classList.add('active');
  render();
}

function goAdmin(b){
  if (!AU) {
    var pin = prompt('Enter admin PIN:');
    if (pin !== PIN) { alert('Incorrect PIN.'); return; }
    AU = true;
  }
  go('admin', b);
}

function render(){
  var p = pg(); if(!p) return;
  if (CT==='status') rSt(p);
  else if (CT==='signup') rSg(p);
  else rAd(p);
  rHd();
}

function rHd(){
  var e = document.getElementById('hdr-sub'); if(!e) return;
  var c = ST.cfg;
  if (!c) { e.textContent = 'Admin setup required'; return; }
  if (c.done) { e.textContent = 'All done!'; return; }
  e.textContent = 'Now signing up: ' + c.pcs[c.activeIdx];
}

// ── STATUS TAB ──
function rSt(p){
  var c = ST.cfg, s = sa();
  if (!c) {
    p.innerHTML = '<div class="card" style="text-align:center;padding:28px;color:#888">Waiting for admin to start signup...</div>';
    return;
  }
  var o = '';
  if (!c.done) o += '<div class="ban ban-amber">Now signing up: <strong>'+c.pcs[c.activeIdx]+'</strong></div>';
  else o += '<div class="ban ban-green">All PCs signed up! '+tp()+' people total</div>';

  o += '<div class="sec">Houses</div>';
  HOUSES.forEach(function(name){
    var cap = c.caps[name] || 22;
    var used = hu(name), rem = cap-used, pv = pct(used,cap), cl = pv>=100?'full':pv>=70?'low':'ok';
    o += '<div class="card" style="padding:10px 14px"><div style="display:flex;justify-content:space-between;align-items:baseline">'
      +'<span style="font-weight:600;font-size:14px">'+name+'</span>'
      +'<span class="'+cl+'" style="font-size:13px;font-weight:600">'+(rem<=0?'Full':rem+' left')
      +'<span style="color:#aaa;font-weight:400;font-size:12px"> / '+cap+'</span></span></div>'
      +'<div class="bar-wrap"><div class="bar b-'+cl+'" style="width:'+pv+'%"></div></div></div>';
  });

  o += '<div class="sec">PC queue</div>';
  c.pcs.forEach(function(pc, i){
    var st = i < c.activeIdx ? 'done' : (i===c.activeIdx && !c.done ? 'active' : 'wait');
    var ps = s.filter(function(x){return x.pc===pc && !x.voided;});
    var pt = ps.reduce(function(a,x){return a+x.count;},0);
    var tg = pt>0 ? ps.map(function(x){return x.count+'->'+x.house.replace('House ','');}).join(', ')+' ('+pt+'p)' : '';
    o += '<div class="pc-item'+(st==='active'?' pc-active':st==='done'?' pc-done':'')+'"><div>'
      +'<span class="dot d-'+(st==='active'?'a':st==='done'?'d':'w')+'"></span>'+pc+'</div>'
      +(tg?'<div class="pc-tag">'+tg+'</div>':'')+'</div>';
  });

  o += '<div class="sync">Auto-refreshes every 4s</div>';
  p.innerHTML = o;
}

// ── SIGNUP TAB ──
function rSg(p){
  var c = ST.cfg;
  if (!c || !c.started) { p.innerHTML = '<div class="card" style="text-align:center;padding:28px;color:#888">Signup hasn\'t started yet.</div>'; return; }
  if (c.done) { p.innerHTML = '<div class="card" style="text-align:center;padding:28px"><span style="color:#1a7a52;font-weight:600">All PCs have signed up!</span></div>'; return; }

  var act = c.pcs[c.activeIdx];
  var o = '<div class="card">';
  o += '<span class="lbl">Your PC</span>'
    +'<select onchange="SS.pc=this.value;rSg(pg())">'
    +'<option value="">Select your PC...</option>'
    +c.pcs.map(function(x){return '<option value="'+x+'"'+(SS.pc===x?' selected':'')+'>'+x+'</option>';}).join('')
    +'</select>';

  if (SS.pc && SS.pc !== act) {
    o += '<div class="msg err">Not '+SS.pc+'\'s turn yet — currently: <strong>'+act+'</strong></div></div>';
    p.innerHTML = o; return;
  }

  if (SS.pc === act) {
    o += '<div class="ban ban-amber" style="margin-top:12px">It\'s '+act+'\'s turn!</div>';
    o += '<span class="lbl">Your name</span>'
      +'<input type="text" placeholder="First Last" value="'+SS.name+'" oninput="SS.name=this.value" />';
    o += '<span class="lbl">Date\'s name <span style="font-weight:400;text-transform:none;font-size:12px">(leave blank if stag)</span></span>'
      +'<input type="text" placeholder="First Last" value="'+SS.dn+'" oninput="SS.dn=this.value" />';
    o += '<span class="lbl">Choose a house</span><div class="house-grid">';
    HOUSES.forEach(function(name){
      var cap = c.caps[name] || 22;
      var used = hu(name), rem = cap-used, full = rem<=0, cl = full?'full':rem<5?'low':'ok';
      o += '<button class="hbtn'+(SS.house===name?' sel':'')+'" '+(full?'disabled':'')
        +' onclick="SS.house=\''+name+'\';rSg(pg())">'
        +'<span class="hn">'+name+'</span>'
        +'<span class="hc '+cl+'">'+(full?'Full':rem+' spot'+(rem===1?'':'s')+' left')+'</span>'
        +'</button>';
    });
    o += '</div><div id="smsg"></div>';
    o += '<button class="btn btn-dark" onclick="subSig()">Submit</button>';
  }
  o += '</div>';
  p.innerHTML = o;
}

function subSig(){
  var c = ST.cfg, pc = SS.pc, house = SS.house, name = SS.name.trim(), dn = SS.dn.trim();
  function er(m){ var e=document.getElementById('smsg'); if(e) e.innerHTML='<div class="msg err">'+m+'</div>'; }
  if (!pc) { er('Select your PC.'); return; }
  if (pc !== c.pcs[c.activeIdx]) { er('Not your turn yet.'); return; }
  if (!name) { er('Enter your name.'); return; }
  if (alreadySigned(name)) { er('You\'ve already signed up. Ask the admin to void your submission if you want to change houses.'); return; }
  if (!house) { er('Select a house.'); return; }
  var cap = c.caps[house] || 22;
  var used = hu(house), cnt = dn ? 2 : 1;
  if (used + cnt > cap) { er('Only '+(cap-used)+' spot(s) left in '+house+'.'); return; }
  var btn = document.querySelector('#page .btn-dark');
  if (btn) { btn.disabled=true; btn.textContent='Saving...'; }
  fp('formals/sigs', {pc:pc, house:house, name:name, dateName:dn, count:cnt, ts:Date.now(), voided:false})
    .then(function(){
      SS = {pc:'',house:'',name:'',dn:''};
      return poll();
    }).then(function(){
      var e = document.getElementById('smsg');
      if (e) e.innerHTML = '<div class="msg suc">Done! '+cnt+' spot'+(cnt>1?'s':'')+' reserved in '+house+'.</div>';
      setTimeout(function(){ rSg(pg()); }, 2500);
    }).catch(function(){
      er('Error saving. Try again.');
      if (btn) { btn.disabled=false; btn.textContent='Submit'; }
    });
}

// ── ADMIN TAB ──
function rAd(p){
  var c = ST.cfg;
  if (!c || AS) { rSetup(p); return; }
  var s = sa();
  var nx = (!c.done && c.activeIdx+1 < c.pcs.length) ? c.pcs[c.activeIdx+1] : null;
  var o = '';
  if (c.done) {
    o += '<div class="ban ban-green">All done! '+tp()+' people signed up.</div>';
  } else {
    o += '<div class="ban ban-amber">Active: <strong>'+c.pcs[c.activeIdx]+'</strong> &nbsp;·&nbsp; '+(c.activeIdx+1)+'/'+c.pcs.length+'</div>';
    o += '<button class="btn btn-green" onclick="advPC()">'+(nx?'Mark done — open '+nx:'Close signup (all done)')+'</button>';
  }
  o += '<button class="btn btn-out" style="margin-top:8px" onclick="AS=true;rAd(pg())">Edit setup</button>';

  o += '<div class="sec">All signups <span class="tag">'+tp()+' people</span></div>';
  if (!s.length) {
    o += '<div style="font-size:13px;color:#888;padding:4px 0">No signups yet.</div>';
  } else {
    HOUSES.forEach(function(house){
      var hs = s.filter(function(x){return x.house===house;});
      if (!hs.length) return;
      var tot = hs.filter(function(x){return !x.voided;}).reduce(function(a,x){return a+x.count;},0);
      var cap = c.caps[house]||22;
      o += '<div class="card" style="padding:10px 14px;margin-bottom:8px">'
        +'<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
        +'<span style="font-weight:600;font-size:14px">'+house+'</span>'
        +'<span style="font-size:12px;color:#888">'+tot+'/'+cap+'</span></div>';
      hs.forEach(function(x){
        o += '<div class="sig-row'+(x.voided?' voided':'')+'"><div>'
          +'<span style="font-weight:600;font-size:13px">'+x.pc+'</span>'
          +'<span style="color:#888;font-size:12px"> · '+x.name+(x.dateName?' + '+x.dateName:' (stag)')+'</span>'
          +(x.voided?'<span style="font-size:11px;color:#a32020;margin-left:6px">voided</span>':'')
          +'</div>'
          +'<div style="display:flex;gap:6px;align-items:center">'
          +(x.voided
            ? '<button class="del-btn" style="font-size:13px;color:#1a7a52" title="Restore" onclick="voidSig(\''+x.id+'\',false)">restore</button>'
            : '<button class="del-btn" style="font-size:13px;color:#e8a000" title="Void" onclick="voidSig(\''+x.id+'\',true)">void</button>'
          )
          +'<button class="del-btn" title="Delete" onclick="delSig(\''+x.id+'\')">&#x2715;</button>'
          +'</div></div>';
      });
      o += '</div>';
    });
  }

  o += '<hr>'
    +'<button class="btn btn-red" onclick="if(confirm(\'Clear all signups?\'))clrSigs()">Clear all signups</button>'
    +'<button class="btn btn-red" style="margin-top:6px;opacity:.7" onclick="fReset()">Full reset</button>';
  p.innerHTML = o;
}

function rSetup(p){
  var c = ST.cfg;
  var caps = (c && c.caps) ? c.caps : {};
  var o = '<div class="card"><span class="lbl" style="margin-top:0">House capacities</span>';
  HOUSES.forEach(function(name){
    var cap = caps[name] || 22;
    o += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
      +'<span style="font-size:14px;flex:1;font-weight:500">'+name+'</span>'
      +'<input type="text" id="cap_'+name.replace(' ','_')+'" value="'+cap+'" style="width:72px" />'
      +'</div>';
  });
  o += '<span class="lbl">Which PCs are attending?</span>';
  SP.forEach(function(x,i){
    o += '<div class="chk-row"><input type="checkbox" id="p'+i+'" '+(x.on?'checked':'')+' onchange="SP['+i+'].on=this.checked" />'
      +'<label for="p'+i+'">'+x.name+'</label></div>';
  });
  o += '<div id="smsg2"></div>'
    +'<button class="btn btn-dark" onclick="saveSU()">'+(ST.cfg?'Save & restart':'Start signup')+'</button>';
  if (ST.cfg) o += '<button class="btn btn-out" onclick="AS=false;rAd(pg())">Cancel</button>';
  o += '</div>';
  p.innerHTML = o;
}

function saveSU(){
  var pcs = SP.filter(function(x){return x.on;}).map(function(x){return x.name;});
  if (!pcs.length) { var e=document.getElementById('smsg2'); if(e) e.innerHTML='<div class="msg err">Select at least one PC.</div>'; return; }
  var caps = {};
  HOUSES.forEach(function(name){
    var el = document.getElementById('cap_'+name.replace(' ','_'));
    caps[name] = el ? (parseInt(el.value)||22) : 22;
  });
  var cfg = {caps:caps, pcs:pcs, activeIdx:0, started:true, done:false};
  fs('formals/cfg', cfg).then(function(){return fd('formals/sigs');}).then(function(){AS=false; return poll();});
}

function advPC(){
  var c = ST.cfg; if(!c) return;
  var nx = c.activeIdx+1;
  fh('formals/cfg', nx>=c.pcs.length ? {activeIdx:nx,done:true} : {activeIdx:nx}).then(function(){return poll();});
}

function voidSig(id, voided){
  fh('formals/sigs/'+id, {voided:voided}).then(function(){return poll();});
}

function delSig(id){ fd('formals/sigs/'+id).then(function(){return poll();}); }
function clrSigs(){ fd('formals/sigs').then(function(){return poll();}); }
function fReset(){ if(!confirm('Reset everything?')) return; fd('formals').then(function(){location.reload();}); }
</script>
</body>
</html>
